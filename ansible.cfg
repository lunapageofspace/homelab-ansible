[defaults]
# General settings
nocows                      = True
callback_result_format      = yaml
force_valid_group_names     = ignore
# File/Directory settings
inventory                   = ./inventory
local_tmp                   = /tmp/ansible
remote_tmp                  = ~/.ansible
log_path                    = ./.ansible/ansible.log
roles_path                  = ./.ansible/roles:./roles
collections_path            = ./.ansible/collections
vault_password_file         = .private/keys/ansible/vault-pass
# Fact Caching settings
fact_caching                = jsonfile
fact_caching_connection     = ./.ansible/facts
# SSH settings
remote_port                 = 22
timeout                     = 60
host_key_checking           = False
# Plugin settings
vars_plugins_enabled        = host_group_vars,community.sops.sops

[inventory]
unparsed_is_failed          = true

[privilege_escalation]
become                      = True

[ssh_connection]
scp_if_ssh                  = smart
retries                     = 3
ssh_args                    = -o ControlMaster=auto -o ControlPersist=30m -o Compression=yes -o ServerAliveInterval=15s -o CertificateFile=~/.ssh/id_ed25519-cert.pub
pipelining                  = True
control_path                = %(directory)s/%%h-%%r
