sshd_config_dropins:
  - name: 100-disable-password-auth.conf
    content: |
      # Disable password authentication for users who are permitted to SUDO without password

      {% for user in misc_allow_sudo_nopasswd %}
      Match User {{ user }}
        PasswordAuthentication no
      {% endfor %}
      Match all
  - name: 101-authorized-keys-directory.conf
    content: |
      # Configure deamon to check authorized keys directory
      AuthorizedKeysFile .ssh/authorized_keys .ssh/authorized_keys.d/