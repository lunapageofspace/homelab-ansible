sshd_userca_signers:
  - filename: ssh_user_ca-zynthovian-xyz.pub
    content: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEmth45B8vaVPPJ6Ds4Y/t3tdfuiSmd7SkLwRGcORm3I ssh-user-ca@zynthovian.xyz"

__host_name_principals:
  - "{{ inventory_hostname }}"
  - "{{ ansible_facts.hostname }}"
  - "{{ ansible_facts.hostname }}.{{ ansible_facts.domain }}"
__host_inet_principals: "{{ ansible_facts.all_ipv4_addresses + ansible_facts.all_ipv6_addresses }}"
# `echo "$(hostname --short),$(hostname --fqdn),$(hostname -i | perl -pe 's/ (?<!$)/,/g')"`
sshd_hostca_host_principals: "{{ ((__host_name_principals | list) + (__host_inet_principals | list)) | join(',') }}"
# `echo "$(hostname --short):ssh-host-ca@zynthovian.xyz"`
sshd_hostca_host_identity: "{{ ansible_facts.hostname }}:ssh-host-ca@zynthovian.xyz"

sshd_hostca_key_file: "{{ playbook_dir }}/../.private/keys/ssh/host-ca.key"
